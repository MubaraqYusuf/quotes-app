<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quotes App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .card {
            border-radius: 16px;
        }

        .quote-card {
            border-left: 5px solid #6f42c1;
        }
    </style>
</head>

<body>
<div class="container py-5">

    <div class="text-center text-white mb-4">
        <h1 class="fw-bold">💬 Quotes Collection</h1>
        <p class="lead">Save and explore inspiring quotes</p>
    </div>

    <div class="text-center mb-4">
        <a href="/add" class="btn btn-light btn-lg px-4 shadow">
            ➕ Add New Quote
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">

            {% for quote, author in quotes %}
            <div class="card shadow-sm mb-3 quote-card">
                <div class="card-body">
                    <blockquote class="blockquote mb-1">
                        <p class="mb-2">“{{ quote }}”</p>
                    </blockquote>
                    <footer class="blockquote-footer text-end">
                        {{ author }}
                    </footer>
                </div>
            </div>
            {% endfor %}

            {% if not quotes %}
            <div class="alert alert-light text-center shadow">
                No quotes yet — add your first one! ✨
            </div>
            {% endif %}

        </div>
    </div>

</div>
</body>
</html>
