<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quotes App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📜 Quotes App</h2>
        <a href="/add" class="btn btn-primary">+ Add Quote</a>
    </div>

    <form method="get" action="/search" class="input-group mb-3">
        <input type="text" name="q" class="form-control" placeholder="Search quotes...">
        <button class="btn btn-outline-secondary">Search</button>
    </form>

    <div class="card shadow-sm">
        <ul class="list-group list-group-flush">
            {% for id, quote, author in quotes %}
            <li class="list-group-item">
                <blockquote class="blockquote mb-1">
                    "{{ quote }}"
                </blockquote>
                <footer class="blockquote-footer">{{ author }}</footer>

                <div class="mt-2">
                    <a href="/edit/{{ id }}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="/delete/{{ id }}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this quote?')">Delete</a>
                </div>
            </li>
            {% else %}
            <li class="list-group-item text-muted">No quotes yet.</li>
            {% endfor %}
        </ul>
    </div>
</div>

</body>
</html>
